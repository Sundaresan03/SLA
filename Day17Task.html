<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         let num=Number(prompt("Enter a number to check Positive or Negative"));
        if(num>0)
    {
        console.log("Number is Positive");
    }
    else
    {
        console.log("Number is Negative");
    }

     switch(num)
    {
         case 1:
             {
            console.log("Sunday");
            break;
            }
            case 2:
            {
            console.log("Monday");
            break;
            }
            case 3:
            {
            console.log("Tuesday");
            break;
            }
            case 4:
            {
            console.log("Wednesday");
            break;
            }
            case 5:
            {
            console.log("Thursday");
            break;
            }
            case 6:
            {
            console.log("Friday");
            break;
            }
            case 7:
            {
            console.log("Saturday");
            break;
            }
        default:
            {
            console.log("Not a day");
            break;
        }     
   }

   let a = 20;
 let b=10;
console.log(`Sum of ${a} + ${b} = ${a+b}`);
console.log(`difference of ${a} - ${b} = ${a-b}`);
console.log(`Product of ${a} * ${b} = ${a*b}`);
console.log(`Division of ${a} / ${b} = ${a/b}`);
console.log(`Modulus of ${a} % ${b} = ${a%b}`);
console.log(`Exponent of ${a} ** ${b} = ${a**b}`);
    </script>
</body>
</html>
