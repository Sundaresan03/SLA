 //15.find out the given no is Armstrong no or not (153= 1 ^ 3 + 5 ^ 3 + 3 ^ 3 = 153)
function armstrong(){  //without parameters
 let num=Number(prompt("Enter a Number"));
       let temp=num;
       let sum=0;
       while(temp!=0)
       {
         let rem=parseInt(temp%10);
         sum=sum+(rem*rem*rem);
         temp=parseInt(temp/10);
       }
       if(sum==num)
       {
        console.log("Armstrong number");
       }
       else
       {
        console.log("Not an Armstrong Number");
       }
    }

//20.Palindrom or not    BAAB,MALAYALAM
function Palindrome(){ //without parameter
let str=prompt("Enter a string");
let reverse="";
for(let i=str.length-1;i>=0;i--)
{
    reverse+=str[i];
}
if(str==reverse)
{
    console.log("Palindrome");
}
else
{
    console.log("Not Palindrome");
}
}
Palindrome();

function Palindrome(str){ //with parameter
//let str=prompt("Enter a string");
