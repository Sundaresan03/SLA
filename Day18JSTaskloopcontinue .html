   <script>
      // <!--1.Armstrong Number -->
       let num=Number(prompt("Enter a Number"));
       let temp=num;
       let sum=0;
       while(temp!=0)
       {
         let rem=parseInt(temp%10);
         sum=sum+(rem*rem*rem);
         temp=parseInt(temp/10);
       }
       if(sum==num)
       {
        console.log("Armstrong number");
       }
       else
       {
        console.log("Not an Armstrong Number");
       }
     
  //  2.Factorial Program

    let fact=1;
    let num=Number(prompt("Enter a number"));
    for(let i=1;i<=num;i++)
   {
        fact*=i;
   }
   console.log(fact);

//3.Prime Number Program
let count=0;
let num=Number(prompt("Enter a number"));
     for(let i=1;i<=num;i++)
     {

     {

     }

//20.Palindrom or not    BAAB,MALAYALAM

let str=prompt("Enter a string");
let reverse="";
for(let i=str.length-1;i>=0;i--)
{
    reverse+=str[i];
}
if(str==reverse)
{
    console.log("Palindrome");
}
else
{
    console.log("Not Palindrome");
}
